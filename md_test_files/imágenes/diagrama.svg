<svg width="900" height="260" xmlns="http://www.w3.org/2000/svg">
  <!-- Estilo básico -->
  <style>
    .box { fill:#f5f5f5; stroke:#333; stroke-width:1.5; }
    .actor { fill:#e0f7fa; stroke:#006064; stroke-width:1.5; }
    .server { fill:#e8eaf6; stroke:#1a237e; stroke-width:1.5; }
    .label { font-family: Arial, sans-serif; font-size:12px; }
    .title { font-family: Arial, sans-serif; font-size:14px; font-weight:bold; }
    .arrow { stroke:#333; stroke-width:1.5; marker-end:url(#arrowhead); }
  </style>

  <!-- Definición de flecha -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
            refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Título -->
  <text x="450" y="25" text-anchor="middle" class="title">
    Flujo de envío, transporte y recepción de un correo electrónico
  </text>

  <!-- Actor: Usuario emisor -->
  <rect x="40" y="70" width="120" height="60" rx="8" ry="8" class="actor" />
  <text x="100" y="95" text-anchor="middle" class="label">Usuario emisor</text>
  <text x="100" y="112" text-anchor="middle" class="label">Cliente de correo</text>

  <!-- Servidor SMTP saliente -->
  <rect x="230" y="70" width="150" height="60" rx="8" ry="8" class="server" />
  <text x="305" y="95" text-anchor="middle" class="label">Servidor de correo</text>
  <text x="305" y="112" text-anchor="middle" class="label">SMTP saliente</text>

  <!-- Servidor SMTP entrante -->
  <rect x="450" y="70" width="150" height="60" rx="8" ry="8" class="server" />
  <text x="525" y="95" text-anchor="middle" class="label">Servidor de correo</text>
  <text x="525" y="112" text-anchor="middle" class="label">SMTP entrante</text>

  <!-- Actor: Usuario destinatario -->
  <rect x="690" y="70" width="140" height="60" rx="8" ry="8" class="actor" />
  <text x="760" y="95" text-anchor="middle" class="label">Usuario destinatario</text>
  <text x="760" y="112" text-anchor="middle" class="label">Cliente de correo</text>

  <!-- Flechas y etiquetas de protocolo -->
  <!-- Emisor -> Servidor saliente (SMTP) -->
  <line x1="160" y1="100" x2="230" y2="100" class="arrow" />
  <text x="195" y="90" text-anchor="middle" class="label">SMTP</text>
  <text x="195" y="125" text-anchor="middle" class="label">Envío</text>

  <!-- Servidor saliente -> Servidor entrante (SMTP entre servidores) -->
  <line x1="380" y1="100" x2="450" y2="100" class="arrow" />
  <text x="415" y="90" text-anchor="middle" class="label">SMTP</text>
  <text x="415" y="125" text-anchor="middle" class="label">Transporte</text>

  <!-- Servidor entrante -> Destinatario (IMAP/POP3) -->
  <line x1="600" y1="100" x2="690" y2="100" class="arrow" />
  <text x="645" y="88" text-anchor="middle" class="label">IMAP / POP3</text>
  <text x="645" y="125" text-anchor="middle" class="label">Recepción</text>

  <!-- Nota de actores -->
  <text x="450" y="190" text-anchor="middle" class="label">
    Actores: usuarios (clientes de correo) y servidores de correo (SMTP, IMAP/POP3)
  </text>
</svg>
